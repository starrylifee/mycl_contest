<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>웹앱 기획서 (3~4학년)</title>
<style>
  @media print { body { margin: 0; } }
  body { font-family: 'Malgun Gothic', sans-serif; max-width: 700px; margin: 20px auto; padding: 20px; }
  h1 { text-align: center; font-size: 22px; border-bottom: 3px solid #4f46e5; padding-bottom: 8px; }
  .subtitle { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 20px; }
  .field { margin-bottom: 18px; }
  .label { font-size: 14px; font-weight: bold; color: #374151; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .emoji { font-size: 18px; }
  .box { border: 1.5px solid #d1d5db; border-radius: 8px; min-height: 60px; padding: 8px; background: #f9fafb; }
  .box-sm { min-height: 36px; }
  .tip { font-size: 11px; color: #9ca3af; margin-top: 3px; }
  .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  footer { margin-top: 30px; text-align: center; font-size: 11px; color: #d1d5db; }
  .star-row { display: flex; gap: 8px; margin-top: 8px; }
  .star { width: 28px; height: 28px; border: 1.5px solid #d1d5db; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
</style>
</head>
<body>
<h1>🎮 웹앱 기획서</h1>
<div class="subtitle">3~4학년 | 에듀앱 빌더</div>

<div class="name-row">
  <div class="field">
    <div class="label"><span class="emoji">👤</span> 이름</div>
    <div class="box box-sm"></div>
  </div>
  <div class="field">
    <div class="label"><span class="emoji">📅</span> 날짜</div>
    <div class="box box-sm"></div>
  </div>
</div>

<div class="field">
  <div class="label"><span class="emoji">📱</span> 앱 이름</div>
  <div class="box box-sm"></div>
  <div class="tip">예: 구구단 퀴즈 게임, 낱말 맞추기</div>
</div>

<div class="field">
  <div class="label"><span class="emoji">💬</span> 앱 설명</div>
  <div class="box"></div>
  <div class="tip">어떤 앱인지 2~3문장으로 설명해보세요</div>
</div>

<div class="field">
  <div class="label"><span class="emoji">⚙️</span> 주요 기능 (할 수 있는 것들)</div>
  <div class="box"></div>
  <div class="tip">예: 문제 내기 / 점수 보여주기 / 다시 하기</div>
</div>

<div class="field">
  <div class="label"><span class="emoji">🎯</span> 게임 규칙</div>
  <div class="box"></div>
  <div class="tip">어떻게 하는 게임인지 설명해주세요</div>
</div>

<div class="field">
  <div class="label"><span class="emoji">🏆</span> 이기는 조건 (승리 조건)</div>
  <div class="box box-sm"></div>
  <div class="tip">예: 10문제 중 8개 이상 맞히면 이겨요</div>
</div>

<footer>에듀앱 빌더 — 학생 기획서 템플릿 (3~4학년)</footer>
</body>
</html>
